; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.arduino.usb_cdc_on_boot = 1
upload_port = COM7
monitor_port = COM7
upload_speed = 115200

lib_deps =
    adafruit/Adafruit Unified Sensor
    adafruit/Adafruit BusIO
    olikraus/U8g2
    kosme/arduinoFFT

build_flags =
    ; ── Moduły opcjonalne: ustaw na 1 żeby włączyć, 0 żeby wyłączyć ───────
    -D ENABLE_OLED=1
    -D ENABLE_ADXL=1
    -D ENABLE_MODBUS=1
    ; ── Konfiguracja I2C / OLED ─────────────────────────────────────────────
    -D CONFIG_SDA_PIN=21
    -D CONFIG_SCL_PIN=22
    -D CONFIG_OLED_ADDR=0x3C
    ; ── Konfiguracja ADXL345 ────────────────────────────────────────────────
    -D CONFIG_ADXL_SPI_CS_PIN=5
    -D CONFIG_ADXL_SPI_SCK_PIN=18
    -D CONFIG_ADXL_SPI_MOSI_PIN=23
    -D CONFIG_ADXL_SPI_MISO_PIN=19
    -D CONFIG_ADXL_ODR=800
    -D CONFIG_RMS_WINDOW=256
    ; ── FFT ─────────────────────────────────────────────────────────────────
    -D CONFIG_FFT_SIZE=1024
    -D CONFIG_FFT_FS=800
    ; ── Modbus TCP ───────────────────────────────────────────────────────────
    -D CONFIG_MODBUS_PORT=502
    -D CONFIG_MODBUS_UNIT_ID=1
    ; ── Wi-Fi timery ────────────────────────────────────────────────────────
    -D CONFIG_WIFI_TIMEOUT_MS=15000
    -D CONFIG_WIFI_RETRY_MS=10000
    -D CONFIG_HEARTBEAT_MS=5000
    -D CONFIG_SENSOR_LOG_MS=2000
