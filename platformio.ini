; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-c3-devkitm-1]
platform = espressif32
board = lolin_c3_mini
framework = arduino
monitor_speed = 115200
board_build.arduino.usb_cdc_on_boot = 1
upload_port = COM8
monitor_port = COM8
upload_speed = 115200

lib_deps =
    adafruit/Adafruit ADXL345
    adafruit/Adafruit Unified Sensor
    olikraus/U8g2

build_flags =
    ; ── Moduły opcjonalne: ustaw na 1 żeby włączyć, 0 żeby wyłączyć ───────
    -D ENABLE_OLED=0
    -D ENABLE_ADXL=1
    ; ── Konfiguracja I2C / OLED ─────────────────────────────────────────────
    -D CONFIG_SDA_PIN=8
    -D CONFIG_SCL_PIN=9
    -D CONFIG_OLED_ADDR=0x3C
    ; ── Konfiguracja ADXL345 ────────────────────────────────────────────────
    -D CONFIG_ADXL_ODR=800
    -D CONFIG_RMS_WINDOW=256
    ; ── Wi-Fi timery ────────────────────────────────────────────────────────
    -D CONFIG_WIFI_TIMEOUT_MS=15000
    -D CONFIG_WIFI_RETRY_MS=10000
    -D CONFIG_HEARTBEAT_MS=5000
    -D CONFIG_SENSOR_LOG_MS=2000
